    evotodi_password_meter.pm_score_provider:
        class: Evotodi\PasswordMeterBundle\Services\ScoreRangeProvider
        public: false

    evotodi_password_meter.score_provider:
        alias: evotodi_password_meter.pm_score_provider
        public: false