# yaml-language-server: $schema=../../../vendor/symfony/dependency-injection/Loader/schema/services.schema.json
services:
    evotodi_password_meter.password_meter:
        class: Evotodi\PasswordMeterBundle\PasswordMeter
        public: false
        arguments:
            - '@evotodi_password_meter.requirements_provider'
            - '@evotodi_password_meter.score_provider'

    Evotodi\PasswordMeterBundle\PasswordMeter:
        alias: evotodi_password_meter.password_meter
